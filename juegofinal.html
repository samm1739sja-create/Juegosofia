<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Juego para Sofía ❤️</title>
<style>
body{
margin:0;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:Arial;
user-select:none;
-webkit-user-select:none;
}

/* INICIO */
#inicio{
position:absolute;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:20;
}
#inicio button{
padding:20px;
font-size:20px;
cursor:pointer;
background:#ff69b4;
color:white;
border:none;
border-radius:10px;
margin-top:20px;
}

/* JUEGO */
#game{
display:none;
width:min(98vw, 1500px);
height:min(98vw, 450px);
overflow:hidden;
border:4px solid white;
position:relative;
}

#world{
position:absolute;
width:5000px;
height:450px;
background-image:url("fondo.png");
background-size:cover;
background-repeat:repeat-x;
background-position:center top;
left:0;
top:0;
}

#suelo{
position:absolute;
bottom:0;
width:5000px;
height:100px;
background:#654321;
border-top:4px solid #8b4513;
}

/* LETRAS DE LA CANCIÓN - SIGUIENDO AL PERSONAJE */
#lyrics-container {
position: absolute;
width: 400px; 
text-align: center;
color: white;
font-weight: bold;
text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
font-size: 20px;
pointer-events: none;
z-index: 15;
bottom: 190px;
}

/* ELEMENTOS */
#player{
position:absolute;
bottom:100px;
left:50px;
width:70px;
height:auto;
z-index:5;
}

.obstaculo{
position:absolute;
bottom:100px;
width:70px;
height:auto;
z-index:5;
}

.ladrillo {
position: absolute;
bottom: 220px;
width: 150px;
height: 30px;
background: #b22222;
border: 2px solid #551111;
border-radius: 4px;
z-index: 4;
display: flex;
justify-content: center;
align-items: center;
color: white;
font-size: 10px;
}

#corazon{
position:absolute;
bottom:100px;
left:4500px;
width:80px;
height:auto;
z-index:5;
}

/* CONTROLES */
#controles{
margin-top:10px;
display:flex;
gap:20px;
}
.control{
width:70px;
height:70px;
background:#ffffff;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
color:black;
cursor:pointer;
}

#controlMusica{
margin-top:15px;
padding:10px 20px;
background:#ff69b4;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}
</style>
</head>
<body>

<div id="inicio">
<h1>Juego para Sofía ❤️</h1>
<button onclick="startGame()">Comenzar</button>
</div>

<div id="game">
<div id="world">
    <div id="lyrics-container"></div>
    <img id="player" src="personaje.png" alt="Personaje">
    
    <img class="obstaculo" src="obstaculo.png" style="left:600px" alt="Obstáculo 1">
    
    <div class="ladrillo" style="left:900px">LADRILLO</div>
    <img class="obstaculo" src="obstaculo.png" style="left:940px" alt="Trampa bajo ladrillo">

    <img class="obstaculo" src="obstaculo.png" style="left:1400px" alt="Obstáculo 2">
    
    <div class="ladrillo" style="left:1700px">LADRILLO</div>
    <img class="obstaculo" src="obstaculo.png" style="left:1740px" alt="Trampa bajo ladrillo">

    <img class="obstaculo" src="obstaculo.png" style="left:2300px" alt="Obstáculo 3">
    
    <div class="ladrillo" style="left:2800px">LADRILLO</div>
    <img class="obstaculo" src="obstaculo.png" style="left:2840px" alt="Trampa bajo ladrillo">

    <img id="corazon" src="corazon.png" alt="Corazón">
    <div id="suelo"></div>
</div>
</div>

<div id="controles">
<div class="control" onmousedown="izquierda=true" onmouseup="izquierda=false" ontouchstart="izquierda=true" ontouchend="izquierda=false">&larr;</div>
<div class="control" onclick="saltar()">↑</div>
<div class="control" onmousedown="derecha=true" onmouseup="derecha=false" ontouchstart="derecha=true" ontouchend="derecha=false">&rarr;</div>
</div>

<button id="controlMusica" onclick="cambiarEstadoMusica()">Pausar Música</button>
<audio id="musicaJuego" preload="auto">
  <source src="TU-CANCION.mp3" type="audio/mpeg">
</audio>

<script>
let player=document.getElementById("player")
let world=document.getElementById("world")
let lyricsBox=document.getElementById("lyrics-container")
let obstaculos=document.querySelectorAll(".obstaculo")
let ladrillos=document.querySelectorAll(".ladrillo")
let corazon=document.getElementById("corazon")
let musica=document.getElementById("musicaJuego")
let btnMusica=document.getElementById("controlMusica")

let x=50
let y=0
let velY=0
let velocidad=6
let izquierda=false
let derecha=false
let saltando=false
let enSuelo=true

const VIEW_WIDTH=document.getElementById("game").clientWidth || 1500;
const WORLD_WIDTH=5000;

// LETRAS
const lyrics = [
    { t: 0, text: "" },
    { t: 11, text: "Where have you been?<br>Do you know when you're comin' back?" },
    { t: 16, text: "Since you've been gone<br>I've got along, but I've been sad" },
    { t: 21, text: "I tried to put it out for you to get<br>Could've, should've, but you never did" },
    { t: 26, text: "Wish you wanted it a little bit<br>More, but it's a chore for you to give" },
    { t: 31, text: "Where have you been?<br>Do you know if you're comin' back?" },
    { t: 36, text: "We were too close to the stars<br>I never knew somebody like you" },
    { t: 41, text: "Fallin' just as hard<br>I'd rather lose somebody than use somebody" },
    { t: 46, text: "Maybe it's a blessing in disguise<br>I see myself in you..." }
];

function startGame(){
    document.getElementById("inicio").style.display="none"
    document.getElementById("game").style.display="block"
    resetPlayer()
    musica.play()
    gameLoop()
}

function gameLoop(){
    if(derecha) x+=velocidad
    if(izquierda) x-=velocidad

    if(!enSuelo){
        // Gravedad (mantenida igual para que la caída sea natural)
        velY -= 0.8;
        y += velY;
    }

    if(y <= 0){
        y = 0;
        velY = 0;
        enSuelo = true;
        saltando = false;
    }

    enSuelo = (y <= 0); 
    ladrillos.forEach(l => {
        let pR = player.getBoundingClientRect();
        let lR = l.getBoundingClientRect();
        // Ajustada colisión para que funcione con el salto más alto
        if(pR.right > lR.left && pR.left < lR.right && pR.bottom <= lR.top + 15 && pR.bottom >= lR.top - 15 && velY <= 0){
            y = 150; 
            velY = 0;
            enSuelo = true;
            saltando = false;
        }
    });

    x=Math.max(0, Math.min(WORLD_WIDTH-70, x))
    player.style.left=x+"px"
    player.style.bottom=(100+y)+"px"
    
    lyricsBox.style.left = (x - 165) + "px";
    lyricsBox.style.bottom = (200 + y) + "px";

    // CÁMARA CENTRADA
    let camX = x - (document.getElementById("game").offsetWidth / 2) + 35;
    camX = Math.max(0, Math.min(WORLD_WIDTH - document.getElementById("game").offsetWidth, camX));
    world.style.left = -camX + "px";

    actualizarLetras();
    checkColision();
    requestAnimationFrame(gameLoop)
}

function actualizarLetras(){
    let currentTime = musica.currentTime;
    let currentLine = lyrics.filter(l => l.t <= currentTime).pop();
    if(currentLine){
        lyricsBox.innerHTML = currentLine.text;
    }
}

function saltar(){
    if(!enSuelo) return
    // Aumentada la fuerza inicial del salto para que dure más (antes 15)
    velY = 20; 
    enSuelo = false;
    saltando = true;
}

function checkColision(){
    let playerRect=player.getBoundingClientRect()
    obstaculos.forEach(o=>{
        let obsRect=o.getBoundingClientRect()
        if(playerRect.left<obsRect.right && playerRect.right>obsRect.left &&
           playerRect.top<obsRect.bottom && playerRect.bottom>obsRect.top){
            alert("¡Cuidado Sofi! Inténtalo de nuevo ❤️")
            resetPlayer()
        }
    })
    let corazonRect=corazon.getBoundingClientRect()
    if(playerRect.left<corazonRect.right && playerRect.right>corazonRect.left &&
       playerRect.top<corazonRect.bottom && playerRect.bottom>corazonRect.top){
        pregunta()
    }
}

function resetPlayer(){
    x=50; y=0; velY=0;
    izquierda=false; derecha=false; saltando=false;
    player.style.left="50px";
    player.style.bottom="100px";
    world.style.left="0px";
}

function pregunta(){
    musica.pause();
    if(confirm("¿Quieres ser mi pareja? ❤️")){
        alert("¡Gracias por todo Sofía! Te amo ❤️")
    }else{
        alert("Espero cambiar tu mente algún día ❤️")
    }
    resetPlayer();
    musica.play();
}

function cambiarEstadoMusica(){
    if(musica.paused){ musica.play(); btnMusica.textContent="Pausar Música"; }
    else { musica.pause(); btnMusica.textContent="Reanudar Música"; }
}

document.addEventListener("keydown",e=>{
    if(e.code==="ArrowRight") derecha=true
    if(e.code==="ArrowLeft") izquierda=true
    if(e.code==="ArrowUp") saltar()
})
document.addEventListener("keyup",e=>{
    if(e.code==="ArrowRight") derecha=false
    if(e.code==="ArrowLeft") izquierda=false
})
</script>
</body>
</html>
